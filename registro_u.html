<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - TD AmezquitaLibreros</title>
    <link rel="stylesheet" href="registro_u.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">TD AMEZQUITALIBREROS</div>
        <nav>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="productos.html">Productos</a>
                <a href="login.html">Admin</a>
                <a href="contacto.html">Contáctanos</a>
            </div>
        </nav>
    </header>

    <main class="contenedor-principal">
        <div class="tarjeta-registro">
            <h2>Crear Cuenta</h2>
            <form >
                <div class="campo">
                    <label>Nombre Completo</label>
                    <input type="text" placeholder="Tu nombre" required>
                </div>

                <div class="campo">
                    <label>Correo Electrónico</label>
                    <input type="email" placeholder="ejemplo@correo.com" required>
                </div>
                 <div class="campo">
                    <label>Identificacion</label>
                    <input type="email" placeholder="ejemplo: 1113861809" required>
                </div>
                <div class="campo">
                    <label>Contraseña</label>
                    <input type="password" placeholder="Mínimo 8 caracteres" required>
                </div>

                <div class="campo">
                    <label>Confirmar Contraseña</label>
                    <input type="password" placeholder="Repite tu contraseña" required>
                </div>

                <div class="seccion-botones">
                    <button type="submit" class="BotonPrincipal">Registrarse</button>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
