<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - TD AmezquitaLibreros</title>
    <link rel="stylesheet" href="contacto.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">Td AmezquitaLibreros</div>
        <nav>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="productos.html">Productos</a>
                <a href="registro_u.html">Registrarse</a>
                <a href="login.html">Admin</a>
            </div>
        </nav>
    </header>

    <main class="contenedor-principal">
        <div class="tarjeta-contacto">
            <h2>Contáctanos</h2>
            
            <div class="info-contacto">
                <div class="detalle">
                    <strong>Dirección:</strong> Cartago Valle del Cauca
                </div>
                <div class="detalle">
                    <strong>Teléfono:</strong> 31030635001
                </div>
                <div class="detalle">
                    <strong>Email:</strong> tdamezquitalibreros@gmail.com
                </div>
            </div>

            <form>
                <div class="campo">
                    <label>Nombre</label>
                    <input type="text" placeholder="Tu nombre" required>
                </div>

                <div class="campo">
                    <label>Asunto</label>
                    <input type="text" placeholder="Motivo de contacto" required>
                </div>

                <div class="campo">
                    <label>Mensaje</label>
                    <textarea placeholder="Escribe tu mensaje aquí..." rows="4" required></textarea>
                </div>

                <div class="seccion-botones">
                    <button type="submit" class="BotonEnviar">Enviar Mensaje</button>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
